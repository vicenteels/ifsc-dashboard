name: Build and Deploy to Azure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  REGISTRY_NAME: ${{ secrets.REGISTRY_NAME }}

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Fazer checkout do código
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Fazer login no Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          auth-type: SERVICE_PRINCIPAL

      # 3. Fazer login no ACR usando Docker
      - name: Login to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # 4. Build e Push da imagem Backend
      - name: Build and push Backend image
        run: |
          cd backend
          docker build -t ${{ env.REGISTRY }}/ifsc-backend:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/ifsc-backend:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/ifsc-backend:${{ github.sha }} ${{ env.REGISTRY }}/ifsc-backend:latest
          docker push ${{ env.REGISTRY }}/ifsc-backend:latest
          cd ..

      # 5. Build e Push da imagem Frontend
      - name: Build and push Frontend image
        run: |
          cd frontend
          docker build -t ${{ env.REGISTRY }}/ifsc-frontend:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/ifsc-frontend:${{ github.sha }}
          docker tag ${{ env.REGISTRY }}/ifsc-frontend:${{ github.sha }} ${{ env.REGISTRY }}/ifsc-frontend:latest
          docker push ${{ env.REGISTRY }}/ifsc-frontend:latest
          cd ..

      # 6. Atualizar Backend Web App
      - name: Deploy Backend to Azure Web App
        run: |
          az webapp config container set \
            --name ifsc-backend-app \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.REGISTRY }}/ifsc-backend:latest \
            --docker-registry-server-url https://${{ env.REGISTRY }} \
            --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

      # 7. Atualizar Frontend Web App
      - name: Deploy Frontend to Azure Web App
        run: |
          az webapp config container set \
            --name ifsc-frontend-app \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ env.REGISTRY }}/ifsc-frontend:latest \
            --docker-registry-server-url https://${{ env.REGISTRY }} \
            --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

      # 8. Reiniciar Web Apps
      - name: Restart Backend Web App
        run: |
          az webapp restart --name ifsc-backend-app --resource-group ${{ env.RESOURCE_GROUP }}

      - name: Restart Frontend Web App
        run: |
          az webapp restart --name ifsc-frontend-app --resource-group ${{ env.RESOURCE_GROUP }}

      # 9. Notificar sucesso
      - name: Deployment Success
        run: |
          echo "✅ Deployment completed successfully!"
          echo "Backend: https://ifsc-backend-app.azurewebsites.net"
          echo "Frontend: https://ifsc-frontend-app.azurewebsites.net"