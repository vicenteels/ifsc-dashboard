name: Build and Deploy to Azure

on:
  push:
    branches:
      - main

env:
  REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}
  RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
  REGISTRY_NAME: ${{ secrets.REGISTRY_NAME }}
  AZURE_CORE_OUTPUT: none

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug OIDC token claims (issuer/audience/subject)
        uses: actions/github-script@v7
        with:
          script: |
            const core = require('@actions/core');
            const token = await core.getIDToken('api://AzureADTokenExchange');
            const payload = JSON.parse(Buffer.from(token.split('.')[1], 'base64url').toString('utf8'));
            console.log(`OIDC iss: ${payload.iss}`);
            console.log(`OIDC aud: ${payload.aud}`);
            console.log(`OIDC sub: ${payload.sub}`);

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          audience: api://AzureADTokenExchange

      - name: Login to ACR
        run: az acr login --name ${{ env.REGISTRY_NAME }}

      - name: Build and push Backend
        run: |
          cd backend
          docker build -t ${{ env.REGISTRY }}/ifsc-backend:latest .
          docker push ${{ env.REGISTRY }}/ifsc-backend:latest
          cd ..

      - name: Build and push Frontend
        run: |
          cd frontend
          docker build -t ${{ env.REGISTRY }}/ifsc-frontend:latest .
          docker push ${{ env.REGISTRY }}/ifsc-frontend:latest
          cd ..

      - name: Deploy Backend
        run: az webapp config container set --name ifsc-backend-app --resource-group ${{ env.RESOURCE_GROUP }} --docker-custom-image-name ${{ env.REGISTRY }}/ifsc-backend:latest --docker-registry-server-url https://${{ env.REGISTRY }} --docker-registry-server-user ${{ secrets.ACR_USERNAME }} --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

      - name: Deploy Frontend
        run: az webapp config container set --name ifsc-frontend-app --resource-group ${{ env.RESOURCE_GROUP }} --docker-custom-image-name ${{ env.REGISTRY }}/ifsc-frontend:latest --docker-registry-server-url https://${{ env.REGISTRY }} --docker-registry-server-user ${{ secrets.ACR_USERNAME }} --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

      - name: Restart Apps
        run: |
          az webapp restart --name ifsc-backend-app --resource-group ${{ env.RESOURCE_GROUP }}
          az webapp restart --name ifsc-frontend-app --resource-group ${{ env.RESOURCE_GROUP }}
